# This is a workflow to automate the deployment of 613covid.ca

name: Website-update

# Runs when there's push to master
on: 
  push:
    branches: master
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'

jobs:
  blogdown:
    name: Render-Blog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true

      # Consolidated system dependencies.
      # Removed libtbb-dev and changed libtiff5-dev to libtiff-dev.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff-dev \
            libjpeg-dev \
            libuv1-dev

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install hugo
        run: Rscript -e 'blogdown::install_hugo(version = "0.123.0")'

      - name: Render website
        run: Rscript -e 'blogdown::build_site(build_rmd = TRUE)'

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
