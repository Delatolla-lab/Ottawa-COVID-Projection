# This is a workflow to automate the deployment of 613covid.ca

name: Website-update

# Runs when there's push to master
on: 
  push:
    branches: master
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'

jobs:
  blogdown:
    name: Render-Blog
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v2
        with:
          ref: master
      - name: Optimize Ubuntu Mirrors
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu/|http://mirror.init7.net/ubuntu/|g' /etc/apt/sources.list
          sudo sed -i 's|http://archive.ubuntu.com/ubuntu/|http://mirror.init7.net/ubuntu/|g' /etc/apt/sources.list
          sudo sed -i 's|http://security.ubuntu.com/ubuntu/|http://mirror.init7.net/ubuntu/|g' /etc/apt/sources.list
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true
      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
      - uses: r-lib/actions/setup-pandoc@v2
      - name: Install libcurl4-openssl-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libcurl4-openssl-dev || (sleep 30 && sudo apt-get update && sudo apt-get install -y --fix-missing libcurl4-openssl-dev)
      - name: Install harfbuzz and fribidi
        run: |
          sudo apt-get install -y --fix-missing libharfbuzz-dev libfribidi-dev || (sleep 30 && sudo apt-get update && sudo apt-get install -y --fix-missing libharfbuzz-dev libfribidi-dev)
      - name: Install system dependencies for systemfonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libfontconfig1-dev libfreetype6-dev || (sleep 30 && sudo apt-get update && sudo apt-get install -y --fix-missing libfontconfig1-dev libfreetype6-dev)
      - name: Install system dependencies for ragg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libuv1-dev || (sleep 30 && sudo apt-get update && sudo apt-get install -y --fix-missing libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libuv1-dev)
      - name: install hugo
        run: Rscript -e 'blogdown::install_hugo(version = "0.123.0")'
      - name: Render website
        run: Rscript -e 'blogdown::build_site(build_rmd = TRUE)'
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
